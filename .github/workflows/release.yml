name: Release

# Publishes `openlore` to npm with provenance using npm Trusted Publishing
# (OIDC) — no long-lived NPM_TOKEN required. See docs/publishing.md for the
# one-time setup steps on the npmjs.com side.
#
# Triggers (any of these runs validate → [create GitHub Release] → publish):
#   - push of a `v*` tag  — the normal path. Pushing the tag auto-creates the
#     GitHub Release (with generated notes) and publishes to npm in one run.
#   - a GitHub Release published manually in the UI — the create-release job is
#     skipped (the Release already exists) and publish runs.
#   - workflow_dispatch — manual re-publish of an existing tag if a prior run
#     failed mid-way.
#
# Note on the no-double-run: a Release created by this workflow with the default
# GITHUB_TOKEN does NOT emit a `release: published` event, so the tag-push path
# does not re-trigger itself via the release trigger.

on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v2.0.2). Must already exist on origin.'
        required: true
        type: string

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # workflow_dispatch → the explicitly-named tag.
          # push (tag) and release events → github.ref already points at the tag.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      # Fail fast and loud if the tag doesn't match package.json's version.
      # Without this, a tag pushed without the matching `chore(release)` bump
      # sails through validate and dies late in `npm publish` with the cryptic
      # "cannot publish over the previously published version" (this is exactly
      # how the first v2.0.6 publish failed). Catch it here with a clear message.
      - name: Verify tag matches package.json version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Release tag '$TAG' does not match package.json version '$PKG'. Bump package.json + package-lock.json in a chore(release) commit, retag at that commit, and re-run."
            exit 1
          fi
          echo "Tag '$TAG' matches package.json version '$PKG'."

      - name: Run linting
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    # Only the tag-push path creates the Release. On `release: published` the
    # Release already exists; on workflow_dispatch we re-publish an existing tag.
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      # Create the Release for this tag with auto-generated notes, unless one
      # already exists (idempotent — safe to re-run). Created with GITHUB_TOKEN,
      # so it deliberately does NOT fire another `release: published` run.
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping creation."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag
          fi

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [validate, create-release]
    # Run after validate succeeds and create-release either succeeded (tag-push)
    # or was skipped (release / workflow_dispatch paths).
    if: |
      always() &&
      needs.validate.result == 'success' &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    # `id-token: write` is required for npm Trusted Publishing (OIDC) and for
    # `npm publish --provenance` to mint an attestation.
    permissions:
      contents: read
      id-token: write
    # Scopes the OIDC token to a named environment so npm's Trusted Publisher
    # config can require it. Create this environment under repo
    # Settings → Environments before enabling Trusted Publishing.
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/openlore
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build
        run: npm run build

      # No NODE_AUTH_TOKEN — npm picks up the OIDC token automatically when
      # `id-token: write` is set and the package is configured for Trusted
      # Publishing on npmjs.com. --provenance attaches a signed attestation
      # linking this build to this repo + this workflow run.
      - name: Publish to npm
        run: npm publish --provenance --access public

  bump-homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: [publish]
    # Runs only after a successful npm publish — the tap pins the npm tarball, so
    # the artifact must exist on the registry first. Best-effort: if the tap or its
    # token isn't configured yet, the job warns and exits cleanly (npm release is
    # already done; this never retroactively fails it).
    if: needs.publish.result == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # `secrets` can't be used in a job-level `if:`, so gate at the step level:
      # absent token → skip the remaining steps with a warning rather than fail.
      - name: Check for tap token
        id: gate
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping Homebrew tap update. Create the clay-good/homebrew-openlore tap and add the secret to enable (see packaging/homebrew/README.md)."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version
        id: ver
        if: steps.gate.outputs.present == 'true'
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Regenerate formula from the published tarball
        if: steps.gate.outputs.present == 'true'
        run: node scripts/update-homebrew-formula.mjs --version "${{ steps.ver.outputs.version }}"

      - name: Check out the Homebrew tap
        if: steps.gate.outputs.present == 'true'
        uses: actions/checkout@v6
        with:
          repository: clay-good/homebrew-openlore
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Commit & push the updated formula to the tap
        if: steps.gate.outputs.present == 'true'
        run: |
          mkdir -p tap/Formula
          cp packaging/homebrew/openlore.rb tap/Formula/openlore.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/openlore.rb; then
            echo "Tap formula already at v${{ steps.ver.outputs.version }} — nothing to push."
          else
            git add Formula/openlore.rb
            git commit -m "openlore ${{ steps.ver.outputs.version }}"
            git push
            echo "Pushed openlore ${{ steps.ver.outputs.version }} to the tap."
          fi
